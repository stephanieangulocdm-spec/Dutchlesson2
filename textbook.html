      { sp: 'A', text: 'Hoe {reis} je?' },
      { sp: 'B', text: 'Ik {ga} met de bus van kwart voor {zeven} (6.45) naar het {station}. De bus {komt} om half acht (7.30) aan {bij} het station. Dat is de officiële {tijd}. Maar de bus is niet altijd {op} tijd. Gisteren was {hij} te laat. {Toen} heb ik de trein gemist. Maar meestal {mis} ik hem niet, want hij {vertrekt} om kwart voor acht. Ik heb dus een {kwartier} op het station: vijftien {minuten}. Soms vertrekt de trein ook te {laat}. Maar meestal {komt} hij op tijd.' },

      { sp: 'B', text: 'Bij stap vijf {krijg} je je antwoord op de vraag: {ken} ik de tekst goed? In het menu \u2019Toets\u2019 vind je een {luistertoets}. Je {resultaat} moet 80% of {meer} zijn. In het boek staat ook een {tekst} met gaten voor de {controle}. Die {lees} je hardop. Schrijf {niet} in je boek. Je moet de teksten {later} herhalen.' },

// ========== STATE ==========
let currentText = null;
let isChecked = false;

// ========== INIT TOPIC SELECT ==========
const topicSelect = document.getElementById('topicSelect');
texts.forEach(t => {
  const opt = document.createElement('option');
  opt.value = t.id;
  opt.textContent = t.topic;
  topicSelect.appendChild(opt);
});

const difficultySlider = document.getElementById('difficulty');
const difficultyValue = document.getElementById('difficultyValue');
difficultySlider.addEventListener('input', () => {
  difficultyValue.textContent = difficultySlider.value;
});

// ========== PARSE TEXT INTO TOKENS ==========
// Returns array of { type: 'fixed' | 'blankable', text }
function tokenize(text) {
  const tokens = [];
  const regex = /\{([^}]+)\}|([^{]+)/g;
  let m;
  while ((m = regex.exec(text)) !== null) {
    if (m[1] !== undefined) {
      tokens.push({ type: 'blankable', text: m[1] });
    } else {
      tokens.push({ type: 'fixed', text: m[2] });
    }
  }
  return tokens;
}

// ========== PICK DIALOGUE ==========
function pickText(forceId) {
  if (forceId && forceId !== 'random') {
    return texts.find(t => t.id === forceId);
  }
  const pool = texts.filter(t => !currentText || t.id !== currentText.id);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ========== RENDER ==========
function renderText(textObj) {
  currentText = textObj;
  isChecked = false;
  document.getElementById('topicBadge').textContent = textObj.topic;
  document.getElementById('resultBar').classList.remove('show');

  const container = document.getElementById('textBlock');
  container.innerHTML = '';

  // First pass: collect ALL blankable positions across all lines
  const allBlankables = []; // each: { lineIdx, tokenIdx, text }
  const parsedLines = textObj.lines.map((line, lineIdx) => {
    const tokens = tokenize(line.text);
    tokens.forEach((tok, tokenIdx) => {
      if (tok.type === 'blankable') {
        allBlankables.push({ lineIdx, tokenIdx, text: tok.text });
      }
    });
    return tokens;
  });

  // Pick N random blankables based on slider
  const targetCount = Math.min(parseInt(difficultySlider.value), allBlankables.length);
  const shuffled = allBlankables.slice().sort(() => Math.random() - 0.5);
  const chosen = shuffled.slice(0, targetCount);
  const chosenSet = new Set(chosen.map(c => `${c.lineIdx}_${c.tokenIdx}`));

  // Render each line
  parsedLines.forEach((tokens, lineIdx) => {
    const lineEl = document.createElement('p');
    lineEl.style.marginBottom = '10px';
    const line = textObj.lines[lineIdx];

    // Speaker prefix
    if (line.sp === 'A') {
      const prefix = document.createElement('span');
      prefix.textContent = '> ';
      prefix.style.color = '#1a7a3e';
      prefix.style.fontWeight = '700';
      lineEl.appendChild(prefix);
    } else if (line.sp === 'B') {
      const prefix = document.createElement('span');
      prefix.textContent = '« ';
      prefix.style.color = '#b85a00';
      prefix.style.fontWeight = '700';
      lineEl.appendChild(prefix);
    } else if (line.sp === 'C') {
      const prefix = document.createElement('span');
      prefix.textContent = '» ';
      prefix.style.color = '#1565c0';
      prefix.style.fontWeight = '700';
      lineEl.appendChild(prefix);
    }

    tokens.forEach((tok, tokenIdx) => {
      const key = `${lineIdx}_${tokenIdx}`;
      if (tok.type === 'blankable' && chosenSet.has(key)) {
        // Render as input
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'gap-input';
        input.autocomplete = 'off';
        input.spellcheck = false;
        input.dataset.answer = tok.text;
        const len = Math.max(tok.text.length, 4);
        input.style.width = (len * 10 + 14) + 'px';
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const inputs = Array.from(container.querySelectorAll('.gap-input'));
            const idx = inputs.indexOf(input);
            if (idx < inputs.length - 1) {
              inputs[idx + 1].focus();
            } else {
              checkAnswers();
            }
          }
        });
        lineEl.appendChild(input);
      } else {
        // Render as text (blankable but not chosen, or fixed)
        lineEl.appendChild(document.createTextNode(tok.text));
      }
    });

    container.appendChild(lineEl);
  });

  document.getElementById('stats').textContent = `${chosen.length} gaten in te vullen`;

  const firstInput = container.querySelector('.gap-input');
  if (firstInput) firstInput.focus();
}

// ========== CHECK ==========
function normalize(s) {
  return (s || '')
    .toLowerCase()
    .trim()
    .replace(/[\u2018\u2019\u201A\u201B\u2032]/g, "'")
    .replace(/[\u201C\u201D\u201E\u201F\u2033]/g, '"')
    .replace(/[.,!?;:'"]/g, '');
}

function checkAnswers() {
  if (isChecked) return;
  isChecked = true;

  const inputs = document.querySelectorAll('.gap-input');
  let correct = 0;
  const total = inputs.length;

  inputs.forEach(input => {
    const userAnswer = normalize(input.value);
    const correctAnswer = normalize(input.dataset.answer);
    const ok = userAnswer && userAnswer === correctAnswer;

    input.disabled = true;
    if (ok) {
      input.classList.add('correct');
      correct++;
    } else {
      input.classList.add('incorrect');
      const correction = document.createElement('span');
      correction.className = 'gap-correction';
      correction.textContent = input.dataset.answer;
      input.after(correction);
    }
  });

  const resultBar = document.getElementById('resultBar');
  const scoreEl = document.getElementById('resultScore');
  const pctEl = document.getElementById('resultPct');
  const titleEl = document.getElementById('resultTitle');
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  scoreEl.textContent = `${correct} / ${total}`;
  pctEl.textContent = `${pct}%`;
  scoreEl.classList.remove('bad', 'medium');
  if (pct < 60) {
    scoreEl.classList.add('bad');
    titleEl.textContent = 'Blijf oefenen! 💪';
  } else if (pct < 80) {
    scoreEl.classList.add('medium');
    titleEl.textContent = 'Goed bezig! 👍';
  } else if (pct < 100) {
    titleEl.textContent = 'Heel goed! 🎉';
  } else {
    titleEl.textContent = 'Perfect! 🏆';
  }
  resultBar.classList.add('show');
  resultBar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ========== EVENTS ==========
document.getElementById('checkBtn').addEventListener('click', checkAnswers);

function newExercise() {
  const choice = topicSelect.value;
  const textObj = pickText(choice);
  renderText(textObj);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('newBtn').addEventListener('click', newExercise);
document.getElementById('newAfterBtn').addEventListener('click', newExercise);
topicSelect.addEventListener('change', newExercise);

// ========== START ==========
renderText(pickText('random'));
</script>
